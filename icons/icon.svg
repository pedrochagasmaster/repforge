<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5a1f"/>
      <stop offset="0.55" stop-color="#ffb44c"/>
      <stop offset="1" stop-color="#ffe9c7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="116" fill="#0e1116"/>
  <rect x="36" y="36" width="440" height="440" rx="92" fill="none" stroke="#2a323d" stroke-width="6"/>
  <!-- stacked plates / heat bars: short (cool) to long (hot) = progressive overload -->
  <rect x="150" y="150" width="120" height="40" rx="20" fill="#4fb6d9"/>
  <rect x="150" y="236" width="186" height="40" rx="20" fill="#ffb44c"/>
  <rect x="150" y="322" width="240" height="40" rx="20" fill="url(#heat)"/>
</svg>
